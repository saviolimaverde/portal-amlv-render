<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Cliente - AMLV</title>
  <link rel="stylesheet" href="/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-container">
    <img src="/logo-amlv.png" alt="Logo AMLV" class="logo-login" />
    <form action="/login" method="POST" class="login-form">
      <h2>Portal do Cliente</h2>
      <p>Acesse sua área exclusiva</p>
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" value="teste@amlvadvocacia.com.br" required />
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" value="123456" required />
      <button type="submit">Entrar</button>
      <a href="#" class="forgot-password">Esqueceu sua senha?</a>
      <div class="credentials">
        <strong>Credenciais de teste:</strong><br>
        Email: teste@amlvadvocacia.com.br<br>
        Senha: 123456
      </div>
    </form>
  </div>
</body>
</html>
